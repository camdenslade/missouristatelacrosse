# ─────────────────────────────────────────────────────────────────────────────
# NGINX RTMP + HLS config for Missouri State Lacrosse streaming
#
# SETUP (Amazon Linux 2 / AL2023):
#   sudo yum install -y nginx nginx-mod-rtmp    # Amazon Linux 2
#   sudo dnf install -y nginx nginx-mod-rtmp    # Amazon Linux 2023
#
# If nginx-mod-rtmp is unavailable from the default repo, install from EPEL:
#   sudo yum install -y epel-release && sudo yum install -y nginx-mod-rtmp
#
# Then:
#   1. Copy the RTMP block below into /etc/nginx/nginx.conf (at the top level,
#      OUTSIDE the http {} block)
#   2. Add the /hls location block inside your existing server {} block
#   3. Ensure /tmp/hls exists and nginx can write to it:
#        sudo mkdir -p /tmp/hls && sudo chown nginx:nginx /tmp/hls
#   4. Open port 1935 in your EC2 security group (RTMP)
#   5. sudo systemctl reload nginx
#
# OBS Settings:
#   Service:    Custom
#   Server:     rtmp://api.missouristatelacrosse.com/live
#   Stream Key: (the key returned by POST /api/stream/setup)
# ─────────────────────────────────────────────────────────────────────────────

# ── RTMP block (top level, outside http {}) ───────────────────────────────────
rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record all;
            record_path /recordings;
            record_suffix _%Y%m%d_%H%M%S.flv;
            record_unique on;

            # Validate OBS stream key against Spring Boot before allowing publish.
            # Returns 2xx = allow, 4xx = deny.
            on_publish http://127.0.0.1:8080/api/stream/rtmp/auth;

            # HLS output — one folder per stream key under /tmp/hls/
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;
            hls_playlist_length 10s;
            hls_nested on;

            # Clean up HLS files when OBS disconnects
            hls_cleanup on;
        }
    }
}

